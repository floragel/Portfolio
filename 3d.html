<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Portfolio — Ma Chambre 3D</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0908;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
      cursor: none;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 5;
    }

    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
      width: 18px;
      height: 18px;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.4);
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #crosshair::before {
      top: 0;
      left: 50%;
      width: 2px;
      height: 100%;
      transform: translateX(-50%);
    }

    #crosshair::after {
      top: 50%;
      left: 0;
      width: 100%;
      height: 2px;
      transform: translateY(-50%);
    }

    #crosshair.hi::before,
    #crosshair.hi::after {
      background: #f0c060;
      width: 4px;
      height: 4px;
      box-shadow: 0 0 10px #f0c060, 0 0 20px #f0c060;
    }
    
    #crosshair.hi::before { width: 2px; height: 140%; }
    #crosshair.hi::after { width: 140%; height: 2px; }

    #ilabel {
      position: fixed;
      top: calc(50% - 30px);
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 10;
      color: #f0c060;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    #ilabel.vis {
      opacity: 1;
    }

    #hud {
      position: fixed;
      top: 40px;
      left: 40px;
      z-index: 10;
      color: white;
    }

    #hud h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
      background: linear-gradient(90deg, #fff, #888);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #hud p {
      font-size: 0.6rem;
      opacity: 0.5;
      letter-spacing: 0.2em;
    }

    #ctrl {
      position: fixed;
      bottom: 40px;
      left: 40px;
      z-index: 10;
      color: white;
      font-size: 0.6rem;
      opacity: 0.4;
      display: flex;
      align-items: center;
      gap: 15px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .k {
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 8px;
      border-radius: 4px;
      margin-right: 4px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #0a0908;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      color: white;
      transition: opacity 0.8s ease-in-out;
    }

    #loading.done {
      opacity: 0;
      pointer-events: none;
    }

    #loading span {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0.6;
    }

    .lbar {
      width: 120px;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .lbar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 40%;
      height: 100%;
      background: white;
      animation: load 1.5s infinite ease-in-out;
    }

    @keyframes load {
      0% {
        left: -40%;
      }

      100% {
        left: 100%;
      }
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 9, 8, 0.95);
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      backdrop-filter: blur(10px);
      transition: opacity 0.4s;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .ovb {
      max-width: 400px;
      padding: 40px;
    }

    #overlay h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    #overlay p {
      font-size: 0.8rem;
      opacity: 0.6;
      line-height: 1.8;
      margin-bottom: 30px;
    }

    .obtn {
      padding: 15px 40px;
      border: 1px solid white;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }

    .obtn:hover {
      background: white;
      color: black;
    }

    #vig {
      position: fixed;
      inset: 0;
      z-index: 6;
      background: radial-gradient(circle, transparent 50%, rgba(0, 0, 0, 0.4) 100%);
      pointer-events: none;
    }

    #steps {
      position: fixed;
      bottom: 40px;
      right: 40px;
      z-index: 10;
      display: flex;
      gap: 10px;
      opacity: 0.3;
    }

    .foot {
      font-size: 1.2rem;
      transform: translateY(0);
      transition: transform 0.1s;
    }

    .foot.on {
      transform: translateY(-5px);
      opacity: 1;
    }

    #panel {
      position: fixed;
      top: 50%;
      right: -500px;
      transform: translateY(-50%);
      width: 420px;
      background: rgba(15, 15, 15, 0.95);
      backdrop-filter: blur(20px);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      height: 100vh;
      z-index: 60;
      transition: right 0.6s cubic-bezier(0.19, 1, 0.22, 1);
      padding: 80px 40px;
      color: white;
      overflow-y: auto;
    }

    #panel.open {
      right: 0;
    }

    #pcls {
      position: absolute;
      top: 30px;
      right: 30px;
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    #pcls:hover {
      opacity: 1;
    }

    #ptag {
      color: #f0c060;
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #ptit {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 30px;
      white-space: pre-line;
    }

    #pdsc {
      font-size: 0.9rem;
      line-height: 1.8;
      opacity: 0.6;
      margin-bottom: 50px;
    }

    .pitm {
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding: 25px 0;
    }

    .pit {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .pid {
      font-size: 0.8rem;
      opacity: 0.5;
      margin-bottom: 15px;
    }

    .ptgs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      font-size: 0.55rem;
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 10px;
      border-radius: 100px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    #pico {
      font-size: 3rem;
      margin-bottom: 20px;
      opacity: 0.8;
    }
  </style>
  <script src="js/translations.js"></script>
</head>

<body>
  <div id="loading"><span data-t="hud-loading">Loading environment...</span>
    <div class="lbar"></div>
  </div>
  <div id="overlay">
    <div style="font-size:2.4rem">🏠</div>
    <div class="ovb">
      <h2 data-t="hud-room">My Room</h2>
      <p><span data-t="hud-desc">Explore my portfolio in first person.</span><br><span data-t="hud-interact-inst">Approach furniture ·</span> <strong style="color:#f0c060">E</strong> <span data-t="hud-interact">to interact.</span></p>
      <div class="obtn" id="enterbtn" data-t="hud-enter">Enter</div>
    </div>
  </div>
  <div id="vig"></div>
  <div id="crosshair"></div>
  <div id="ilabel">[ E ] <span data-t="label-interact">Interact</span></div>
  <div id="hud">
    <h1>Nayl Lahlou</h1>
    <p data-t="hud-portfolio">Portfolio · 2026</p>
  </div>
  <div id="ctrl">
    <span class="k">W</span><span class="k">A</span><span class="k">S</span><span class="k">D</span> <span data-t="hud-controls">Walk</span>
    &nbsp;·&nbsp;
    <span class="k">Mouse</span> <span data-t="hud-look">Look Around</span> &nbsp;·&nbsp;
    <span class="k">E</span> <span data-t="hud-interact-key">Interact</span>
    &nbsp;·&nbsp;
    <span class="k">Space</span> <span data-t="hud-jump">Jump</span>
  </div>
  <div id="steps"><span class="foot" id="fl">👟</span><span class="foot" id="fr">👟</span></div>
  <div id="panel">
    <button id="pcls">✕</button>
    <div id="pin">
      <div id="pico"></div>
      <div id="ptag"></div>
      <div id="ptit"></div>
      <div id="pdsc"></div>
      <div class="pitms" id="pitms"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    let currentLang = localStorage.getItem('language') || 'en';
    let DATA = getRoomData(currentLang);

    // Initial translation
    window.addEventListener('DOMContentLoaded', () => {
      applyTranslations(currentLang);
    });

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // Sky Blue
    scene.fog = new THREE.FogExp2(0x87ceeb, 0.015);

    const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.04, 100);
    camera.position.set(0, 1.72, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const pt = new THREE.PointLight(0xfff5e0, 1.2, 15);
    pt.position.set(0, 3, 0);
    scene.add(pt);

    // Sunlight
    const sun = new THREE.DirectionalLight(0xfff0dd, 1.5);
    sun.position.set(10, 8, 10);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    scene.add(sun);

    // ROOF (Super-Slab Armor)
    const roofGeo = new THREE.BoxGeometry(500, 10, 500); 
    const roofMat = new THREE.MeshStandardMaterial({ color: 0xF4EDDE });
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.y = 7.3; // Bottom at 2.3
    scene.add(roof);

    // GARDEN ENVIRONMENT (Enhanced)
    const gardenGeo = new THREE.PlaneGeometry(200, 200);
    const gardenMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 }); // Lush Green
    const garden = new THREE.Mesh(gardenGeo, gardenMat);
    garden.rotation.x = -Math.PI / 2;
    garden.position.y = -0.05;
    garden.receiveShadow = true;
    scene.add(garden);

    // Volumetric Sunlight (God Rays)
    function createGodRay(x, y, z, angleX, angleZ) {
      const rayGeo = new THREE.CylinderGeometry(0.5, 2.0, 15, 32, 1, true);
      const rayMat = new THREE.MeshBasicMaterial({
        color: 0xfff0dd,
        transparent: true,
        opacity: 0.1,
        side: THREE.DoubleSide,
        depthWrite: false
      });
      const ray = new THREE.Mesh(rayGeo, rayMat);
      ray.position.set(x, y, z);
      ray.rotation.x = angleX;
      ray.rotation.z = angleZ;
      scene.add(ray);
    }
    createGodRay(4, 4, -1, Math.PI / 4, -Math.PI / 8); 

    // Stylized Garden Objects
    function createTree(x, z) {
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 2), new THREE.MeshStandardMaterial({ color: 0x3d2b1f }));
      trunk.position.set(x, 1, z);
      trunk.castShadow = true;
      scene.add(trunk);
      
      const canopy = new THREE.Mesh(new THREE.ConeGeometry(1.5, 3, 8), new THREE.MeshStandardMaterial({ color: 0x1e4520 }));
      canopy.position.set(x, 3, z);
      canopy.castShadow = true;
      scene.add(canopy);
    }
    for (let i = 0; i < 60; i++) {
        const ang = Math.random() * Math.PI * 2;
        const rad = 8 + Math.random() * 40;
        createTree(Math.cos(ang) * rad, Math.sin(ang) * rad);
    }

    const loader = new THREE.GLTFLoader();
    const clickables = [];
    const obs = [];

    loader.load('assets/models/portfolio.glb', function (gltf) {
      const room = gltf.scene;
      const box = new THREE.Box3().setFromObject(room);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      const wrapper = new THREE.Group();
      scene.add(wrapper);

      let scale = 1.0;
      if (size.x > 100) scale = 0.01;
      else if (size.x < 1) scale = 100;
      wrapper.scale.setScalar(scale);

      wrapper.rotation.y = 0; // Axis aligned

      room.position.set(-center.x, -center.y, -center.z);
      room.position.y += size.y / 2;
      wrapper.add(room);

      const meshes = {};
      room.traverse(c => {
        if (c.isMesh) {
          c.castShadow = c.receiveShadow = true;
          if (c.material) c.material.side = THREE.DoubleSide;
          
          // Identify specific meshes by name (based on GLB structure)
          const name = c.name.toLowerCase();
          if (name.includes('computer') || name.includes('laptop')) meshes.computer = c;
          if (name.includes('vr') || name.includes('headset')) meshes.vr_headset = c;
          if (name.includes('breadboard')) meshes.breadboard = c;
          if (name.includes('plant')) meshes.plant = c;
          if (name.includes('robot')) meshes.robot = c;
          if (name.includes('controller') || name.includes('gamepad')) meshes.controller = c;
          if (name.includes('medal')) meshes.medal = c;
          if (name.includes('mirror')) meshes.mirror = c;
          if (name.includes('corkboard')) meshes.corkboard = c;
          if (name.includes('dumbbell')) meshes.dumbbells = c;
        }
      });

      // Hitbox Utility - UPDATED to link visual meshes
      function hit(w, h, d, x, y, z, id, label, canBlock = true) {
        const g = new THREE.BoxGeometry(w, h, d);
        const m = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 });
        const hb = new THREE.Mesh(g, m);
        hb.position.set(x, y, z);
        
        // Link to visual mesh for hover effects
        const visual = meshes[id];
        hb.userData = { id, label, visualMesh: visual };
        
        scene.add(hb);
        clickables.push(hb);
        if (canBlock) {
          obs.push({ 
            x1: x - w/2 - 0.1, x2: x + w/2 + 0.1, 
            z1: z - d/2 - 0.1, z2: z + d/2 + 0.1 
          });
        }
      }

      // Restore Monitor Glow
      const monGlow = new THREE.PointLight(0x1a33cc, 0.8, 3.0);
      monGlow.position.set(-1.5, 1.3, -1.6);
      scene.add(monGlow);

      // Collisions
      hit(1.4, 1.5, 1.4, -1.6, 0.8, -1.8, 'desk', 'Desk');
      hit(1.8, 0.8, 0.8, 1.5, 0.4, 1.5, 'bench', 'Sport');
      hit(1.6, 1.0, 2.2, 1.2, 0.5, -1.2, 'bed', 'Bed');
      hit(1.1, 1.2, 0.9, -1.8, 0.6, 1.5, 'dresser', 'IKEA Alex');
      hit(0.6, 0.6, 0.6, 1.8, 0.5, 0.5, 'nightstand', 'Nightstand');
      hit(0.7, 1.2, 0.7, -1.1, 0.6, -1.0, 'chair', 'Chair');
      hit(1.0, 2.0, 0.2, 0, 1.0, 2.1, 'door', 'Door');
      hit(0.1, 2.0, 1.5, 2.1, 1.5, -0.5, 'window', 'Window');
      hit(0.8, 1.2, 0.1, -1.9, 1.5, 0.5, 'mirror', 'Mirror');
      hit(0.5, 0.5, 0.8, 1.8, 0.2, 0.8, 'dumbbells', 'Dumbbells');
      // ROOF COLLIDE BOX (Ethereal - doesn't block walking)
      hit(10, 2.0, 10, 0, 3.5, 0, 'roof_collider', '', false);

      // --- SPECIFIC OBJECT HOTSPOTS ---
      hit(0.4, 0.4, 0.4, -1.5, 1.4, -1.8, 'computer', 'Computer');
      hit(0.3, 0.3, 0.3, -1.2, 1.3, -1.7, 'vr_headset', 'VR Headset');
      hit(0.2, 0.1, 0.3, -1.8, 1.3, -1.6, 'breadboard', 'Breadboard');
      hit(0.3, 0.5, 0.3, -1.8, 1.0, 1.6, 'plant', 'Plant');
      hit(0.3, 0.3, 0.3, -1.6, 0.6, 1.4, 'robot', 'Mini Robot');
      hit(0.3, 0.2, 0.3, -1.9, 0.6, 1.7, 'controller', 'Game Controller');
      hit(0.2, 0.3, 0.1, -1.95, 1.8, 0.1, 'medal', 'Medal');
      hit(0.8, 1.4, 1.0, -1.4, 0.5, -1.2, 'corkboard', 'Corkboard'); // Area around bed/shelf

      // --- PHOTO BOARD (nayl.jpeg) ---
      const photoTex = new THREE.TextureLoader().load('assets/img/nayl.jpeg');
      
      // Frame for profile
      const frameGeo = new THREE.BoxGeometry(0.4, 0.5, 0.05);
      const frameMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 1 });
      const profileFrame = new THREE.Mesh(frameGeo, frameMat);
      profileFrame.position.set(1.6, 1.4, 1.97); // Further Left
      scene.add(profileFrame);

      const photoGeo = new THREE.PlaneGeometry(0.36, 0.46);
      const photoMat = new THREE.MeshStandardMaterial({ 
        map: photoTex, 
        side: THREE.DoubleSide,
        color: 0x666666, // Darker multiplier
        roughness: 1.0,
        metalness: 0,
        emissive: 0x000000
      });
      const photoBoard = new THREE.Mesh(photoGeo, photoMat);
      photoBoard.position.set(0, 0, -0.026); 
      profileFrame.add(photoBoard);
      
      const photoHit = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 0.1), new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 }));
      photoHit.position.copy(profileFrame.position);
      photoHit.userData = { id: 'profile_board', label: 'About Nayl', visualMesh: profileFrame };
      scene.add(photoHit);
      clickables.push(photoHit);

      // --- CORKBOARD ---
      const corkMat = new THREE.MeshStandardMaterial({ color: 0x8d5524, roughness: 0.9 });
      const corkGeo = new THREE.BoxGeometry(0.7, 0.5, 0.04);
      const corkboard = new THREE.Mesh(corkGeo, corkMat);
      corkboard.position.set(-0.4, 1.4, 1.97); // Far Right
      scene.add(corkboard);

      // Corkboard Frame
      const cFrameGeo = new THREE.BoxGeometry(0.74, 0.54, 0.03);
      const cFrameMat = new THREE.MeshStandardMaterial({ color: 0x4d3227 });
      const cFrame = new THREE.Mesh(cFrameGeo, cFrameMat);
      cFrame.position.set(0, 0, 0.01); 
      corkboard.add(cFrame);

      // Post-its
      function addPostIt(x, y, color) {
        const pGeo = new THREE.PlaneGeometry(0.12, 0.12);
        const pMat = new THREE.MeshStandardMaterial({ color, side: THREE.DoubleSide });
        const postIt = new THREE.Mesh(pGeo, pMat);
        postIt.position.set(x, y, -0.021);
        postIt.rotation.z = (Math.random() - 0.5) * 0.2;
        corkboard.add(postIt);
      }
      addPostIt(-0.15, 0.1, 0xfff700); // Yellow
      addPostIt(0.1, 0.05, 0xffa500);  // Orange
      addPostIt(-0.05, -0.1, 0x00ff00); // Green

      const corkHit = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 0.1), new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 }));
      corkHit.position.copy(corkboard.position);
      corkHit.userData = { id: 'corkboard', label: 'Activities', visualMesh: corkboard };
      scene.add(corkHit);
      clickables.push(corkHit);

      // HEAVY PERIMETER BUFFERS (Invisible Thick Walls)
      function buffer(w, h, d, x, y, z) {
        const hb = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 }));
        hb.position.set(x, y, z);
        scene.add(hb);
        obs.push({ 
          x1: x - w/2 - 0.1, x2: x + w/2 + 0.1, 
          z1: z - d/2 - 0.1, z2: z + d/2 + 0.1 
        });
      }
      const tk = 1.0, rd = 1.95 + tk/2;
      buffer(tk, 4, 6, -rd, 1.5, 0); // Thick Left Buffer
      buffer(tk, 4, 6, rd, 1.5, 0);  // Thick Right Buffer
      buffer(6, 4, tk, 0, 1.5, -rd); // Thick Back Buffer
      buffer(6, 4, tk, 0, 1.5, rd);  // Thick Front Buffer

      document.getElementById('loading').classList.add('done');
    }, undefined, e => {
      console.error(e);
      const errSpan = document.querySelector('#loading span');
      if (translations[currentLang] && translations[currentLang]['hud-error']) {
          errSpan.textContent = translations[currentLang]['hud-error'];
      } else {
          errSpan.textContent = '❌ Loading Error';
      }
    });

    let locked = false;
    let suppressPause = false;

    document.getElementById('enterbtn').onclick = () => {
      document.body.requestPointerLock();
      document.getElementById('overlay').classList.add('hidden');
    };

    document.addEventListener('pointerlockchange', () => {
      locked = document.pointerLockElement === document.body;
      if (locked) {
        document.getElementById('overlay').classList.add('hidden');
      } else {
        // Only show overlay if not suppressed by E-toggle
        if (!suppressPause) {
          document.getElementById('overlay').classList.remove('hidden');
        }
      }
    });

    const euler = new THREE.Euler(0, 0, 0, 'YXZ');
    const keys = {};
    document.onkeydown = e => keys[e.code] = true;
    document.onkeyup = e => keys[e.code] = false;
    document.onmousemove = e => {
      if (!locked) return;
      euler.y -= e.movementX * 0.002;
      euler.x -= e.movementY * 0.002;
      euler.x = Math.max(-1.5, Math.min(1.5, euler.x));
    };

    const vel = new THREE.Vector3();
    let vy = 0;
    const gravity = -18;
    const jumpForce = 6;
    let lastT = performance.now();

    function animate() {
      requestAnimationFrame(animate);
      const now = performance.now(), dt = Math.min((now - lastT) / 1000, 0.1); lastT = now;

      if (locked) {
        const move = new THREE.Vector3();
        if (keys['KeyW']) move.z -= 1;
        if (keys['KeyS']) move.z += 1;
        if (keys['KeyA']) move.x -= 1;
        if (keys['KeyD']) move.x += 1;
        if (move.length() > 0) move.normalize();

        const targetSpeed = 3.36;
        vel.x += (move.x * targetSpeed - vel.x) * 12 * dt;
        vel.z += (move.z * targetSpeed - vel.z) * 12 * dt;
        const mv = new THREE.Vector3(vel.x, 0, vel.z).applyQuaternion(camera.quaternion);
        let nx = camera.position.x + mv.x * dt, nz = camera.position.z + mv.z * dt;

        // Object Collisions
        obs.forEach(o => {
          if (nx > o.x1 && nx < o.x2 && nz > o.z1 && nz < o.z2) {
            const dx1 = Math.abs(nx - o.x1), dx2 = Math.abs(nx - o.x2);
            const dz1 = Math.abs(nz - o.z1), dz2 = Math.abs(nz - o.z2);
            const min = Math.min(dx1, dx2, dz1, dz2);
            if (min === dx1) nx = o.x1; else if (min === dx2) nx = o.x2;
            else if (min === dz1) nz = o.z1; else nz = o.z2;
          }
        });

        // World Bounds
        const b = 1.95;
        nx = Math.max(-b, Math.min(b, nx)); nz = Math.max(-b, Math.min(b, nz));
        camera.position.x = nx; camera.position.z = nz;

        // Jump & Gravity
        if (keys['Space'] && camera.position.y <= 1.73) vy = jumpForce;
        vy += gravity * dt;
        let ny = camera.position.y + vy * dt;
        if (ny < 1.72) { ny = 1.72; vy = 0; }
        if (ny > 2.2) { ny = 2.2; vy = 0; }
        camera.position.y = ny;

        camera.quaternion.setFromEuler(euler);
        
        const fL = document.getElementById('fl'), fR = document.getElementById('fr');
        if (fL) fL.classList.remove('on');
        if (fR) fR.classList.remove('on');
      }

      const rc = new THREE.Raycaster();
      rc.setFromCamera(new THREE.Vector2(0, 0), camera);
      const hits = rc.intersectObjects(clickables);
      const labels = document.getElementById('ilabel'), cross = document.getElementById('crosshair');
      
      // RESET HOVER EFFECTS
      clickables.forEach(c => {
        if(c.userData.visualMesh) {
          c.userData.visualMesh.scale.setScalar(1);
          if(c.userData.visualMesh.material && c.userData.visualMesh.material.emissive) 
            c.userData.visualMesh.material.emissive.setHex(0x000000);
        }
      });

      if (locked && hits.length > 0 && hits[0].distance < 4.5) {
        labels.classList.add('vis'); cross.classList.add('hi');
        const id = hits[0].object.userData.id;
        const localizedData = DATA[id];
        const labelText = localizedData ? localizedData.title.replace('\n', ' ') : hits[0].object.userData.label;
        labels.textContent = `[ E ] ${labelText}`;
        
        // APPLY HOVER FEEDBACK
        const obj = hits[0].object;
        if(obj.userData.visualMesh) {
          obj.userData.visualMesh.scale.lerp(new THREE.Vector3(1.04, 1.04, 1.04), 0.2);
          if(obj.userData.visualMesh.traverse) {
              obj.userData.visualMesh.traverse(child => {
                  if(child.isMesh && child.material && child.material.emissive) {
                      child.material.emissive.setHex(0x222222);
                  }
              });
          }
        }

        if (keys['KeyE']) {
          keys['KeyE'] = false; // Prevent rapid fire
          togglePanel(hits[0].object.userData.id);
        }
      } else {
        labels.classList.remove('vis'); cross.classList.remove('hi');
        document.body.style.cursor = 'default';
      }

      renderer.render(scene, camera);
    }
    animate();

    function togglePanel(id) {
      const panel = document.getElementById('panel');
      if (panel.classList.contains('open')) {
        closePanel();
      } else {
        openPanel(id);
      }
    }

    function openPanel(id) {
      const d = DATA[id]; if (!d) return;
      document.getElementById('pico').textContent = d.icon;
      document.getElementById('ptag').textContent = d.tag;
      document.getElementById('ptit').textContent = d.title;
      document.getElementById('pdsc').textContent = d.desc;
      const el = document.getElementById('pitms'); el.innerHTML = '';
      d.items.forEach(i => {
        const v = document.createElement('div'); v.className = 'pitm';
        v.innerHTML = `<div class="pit">${i.t}</div><div class="pid">${i.d}</div><div class="ptgs">${i.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
        el.appendChild(v);
      });
      
      suppressPause = true;
      document.getElementById('panel').classList.add('open');
      document.exitPointerLock();
    }

    function closePanel() {
      document.getElementById('panel').classList.remove('open');
      suppressPause = false;
      document.body.requestPointerLock();
    }

    document.getElementById('pcls').onclick = closePanel;

    // Listen for E inside documents too if needed, but primarily handle globally
    window.addEventListener('keydown', e => {
      if (e.code === 'KeyE' && document.getElementById('panel').classList.contains('open')) {
          closePanel();
      }
    });
    window.onresize = () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); };
  </script>
</body>

</html>
