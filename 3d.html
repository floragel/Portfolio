<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Portfolio — Ma Chambre 3D</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0908;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
      cursor: none;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 5;
    }

    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
      width: 18px;
      height: 18px;
    }

    #crosshair.hi::before,
    #crosshair.hi::after {
      background: #f0c060;
    }

    #ilabel {
      position: fixed;
      top: calc(50% - 30px);
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 10;
      color: #f0c060;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.9);
    }

    #ilabel.vis {
      opacity: 1;
    }

    #hud {
      position: fixed;
      top: 22px;
      left: 28px;
      z-index: 10;
      pointer-events: none;
    }

    #hud h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: rgba(245, 240, 232, 0.92);
      letter-spacing: -0.02em;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
    }

    #hud p {
      color: rgba(140, 130, 110, 0.65);
      font-size: 0.52rem;
      margin-top: 3px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    #ctrl {
      position: fixed;
      bottom: 20px;
      left: 28px;
      z-index: 10;
      pointer-events: none;
      color: rgba(90, 85, 70, 0.6);
      font-size: 0.5rem;
      letter-spacing: 0.08em;
      line-height: 2.2;
      text-transform: uppercase;
    }

    .k {
      display: inline-block;
      border: 1px solid rgba(90, 85, 70, 0.35);
      border-radius: 3px;
      padding: 0 4px;
      font-size: 0.48rem;
      color: rgba(110, 105, 85, 0.6);
      margin: 0 2px;
    }

    #steps {
      position: fixed;
      bottom: 20px;
      right: 28px;
      z-index: 10;
      pointer-events: none;
    }

    .foot {
      font-size: 0.85rem;
      opacity: 0.08;
      transition: opacity 0.1s, transform 0.1s;
    }

    .foot.on {
      opacity: 0.5;
      transform: translateY(-3px);
    }

    #panel {
      position: fixed;
      right: -520px;
      top: 0;
      height: 100vh;
      width: min(480px, 92vw);
      background: rgba(6, 5, 4, 0.98);
      border-left: 1px solid rgba(255, 255, 255, 0.045);
      z-index: 30;
      transition: right 0.44s cubic-bezier(0.77, 0, 0.175, 1);
      overflow-y: auto;
      scrollbar-width: none;
    }

    #panel.open {
      right: 0;
    }

    #panel::-webkit-scrollbar {
      display: none;
    }

    #pcls {
      position: absolute;
      top: 18px;
      right: 18px;
      background: none;
      border: 1px solid #1e1e1a;
      color: #444;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
      font-family: 'Space Mono', monospace;
    }

    #pcls:hover {
      border-color: #f0c060;
      color: #f0c060;
    }

    #pin {
      padding: 58px 32px 38px;
    }

    #pico {
      font-size: 2.2rem;
      margin-bottom: 12px;
    }

    #ptag {
      font-size: 0.52rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #f0c060;
      margin-bottom: 7px;
    }

    #ptit {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.5rem, 3.8vw, 2.2rem);
      font-weight: 800;
      color: #ede8e0;
      line-height: 1.0;
      margin-bottom: 12px;
      white-space: pre-line;
    }

    #pdsc {
      color: #48443e;
      font-size: 0.66rem;
      line-height: 1.9;
      margin-bottom: 20px;
    }

    .pitms {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .pitm {
      border: 1px solid #141412;
      border-radius: 4px;
      padding: 14px 16px;
      transition: border-color 0.18s, background 0.18s;
    }

    .pitm:hover {
      border-color: #222;
      background: #0a0908;
    }

    .pit {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      color: #cec8be;
      font-size: 0.8rem;
      margin-bottom: 4px;
    }

    .pid {
      color: #3c3830;
      font-size: 0.62rem;
      line-height: 1.75;
    }

    .ptgs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 7px;
    }

    .tag {
      background: #0a0908;
      border: 1px solid #1c1a16;
      color: #f0c060;
      font-size: 0.5rem;
      padding: 2px 6px;
      border-radius: 100px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.93);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      cursor: pointer;
      transition: opacity 0.4s;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .ovb {
      text-align: center;
      max-width: 340px;
      padding: 0 20px;
    }

    .ovb h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.8rem, 5.5vw, 2.7rem);
      color: #ede8e0;
      line-height: 1.0;
      margin-bottom: 10px;
    }

    .ovb p {
      color: rgba(110, 105, 85, 0.72);
      font-size: 0.62rem;
      line-height: 1.95;
      margin-bottom: 20px;
    }

    .obtn {
      display: inline-block;
      border: 1px solid #f0c060;
      color: #f0c060;
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      padding: 10px 24px;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
    }

    .obtn:hover {
      background: #f0c060;
      color: #060504;
    }

    #vig {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 42%, rgba(0, 0, 0, 0.72) 100%);
      pointer-events: none;
      z-index: 5;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #060504;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      flex-direction: column;
      gap: 14px;
      transition: opacity 0.5s;
    }

    #loading.done {
      opacity: 0;
      pointer-events: none;
    }

    .lbar {
      width: 80px;
      height: 1px;
      background: #141410;
      position: relative;
      overflow: hidden;
    }

    .lbar::after {
      content: '';
      position: absolute;
      left: -100%;
      top: 0;
      width: 100%;
      height: 100%;
      background: #f0c060;
      animation: ld 1.4s ease forwards;
    }

    @keyframes ld {
      to {
        left: 0;
      }
    }

    #loading span {
      color: #2e2c26;
      font-size: 0.55rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <div id="loading"><span>Loading environment...</span>
    <div class="lbar"></div>
  </div>
  <div id="overlay">
    <div style="font-size:2.4rem">🏠</div>
    <div class="ovb">
      <h2>My Room</h2>
      <p>Explore my portfolio in first person.<br>Approach furniture · <strong style="color:#f0c060">E</strong> to
        interact.</p>
      <div class="obtn" id="enterbtn">Enter</div>
    </div>
  </div>
  <div id="vig"></div>
  <div id="crosshair"></div>
  <div id="ilabel">[ E ] Interact</div>
  <div id="hud">
    <h1>Nayl Lahlou</h1>
    <p>Portfolio · 2026</p>
  </div>
  <div id="ctrl">
    <span class="k">W</span><span class="k">A</span><span class="k">S</span><span class="k">D</span> Walk
    &nbsp;·&nbsp;
    <span class="k">Mouse</span> Look Around &nbsp;·&nbsp;
    <span class="k">E</span> Interact
  </div>
  <div id="steps"><span class="foot" id="fl">👟</span><span class="foot" id="fr">👟</span></div>
  <div id="panel">
    <button id="pcls">✕</button>
    <div id="pin">
      <div id="pico"></div>
      <div id="ptag"></div>
      <div id="ptit"></div>
      <div id="pdsc"></div>
      <div class="pitms" id="pitms"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    const DATA = {
      desk: {
        icon: '💻', tag: 'Setup & Dev Projects', title: 'Coding\nDesk', desc: 'Hardware, software, and integration.', items: [
          { t: 'Clofit', d: 'Digital wardrobe, AI stylist.', tags: ['AI', 'iOS', 'Python'] },
          { t: 'FRC 6622', d: 'Control systems development.', tags: ['C++', 'Java', 'Kotlin'] },
          { t: 'Robotics Projects', d: 'Arduino, ESP32, Gemini AI.', tags: ['Hardware', 'AI'] }
        ]
      },
      bench: {
        icon: '🏋️', tag: 'Discipline', title: 'End Zone\nBench', desc: 'Discipline in code and sport.', items: [
          { t: 'Strength', d: 'Weight training and conditioning.', tags: ['Weight Training'] },
          { t: 'Circus', d: 'Acrobatic performance training.', tags: ['Performance'] },
          { t: 'Cardio', d: '20km preparation.', tags: ['Endurance'] }
        ]
      },
      bed: {
        icon: '🛏️', tag: 'Identity', title: 'Where\nThinking Happens', desc: 'Personal reflections and projects.', items: [
          { t: 'Model UN', d: 'Harvard & MIT conferences goal.', tags: ['MUN', 'Debate'] },
          { t: 'Ologra OS', d: 'Coding since 9 years old.', tags: ['Systems'] },
          { t: 'Style', d: 'Y2K design exploration.', tags: ['Design'] }
        ]
      },
      dresser: {
        icon: '🗄️', tag: 'Journey', title: 'IKEA Alex\n& Milestones', desc: 'Skills and achieved milestones.', items: [
          { t: 'SHAD 2026', d: 'Academic excellence.', tags: ['SHAD'] },
          { t: 'Floragel', d: 'IT Vice-President.', tags: ['Leadership'] },
          { t: 'Objective: MIT', d: 'Next step: EECS.', tags: ['CS', 'Engineering'] }
        ]
      },
      nightstand: {
        icon: '🔋', tag: 'Routine', title: 'Night\nStand', desc: 'Daily essentials.', items: [
          { t: 'Mindset', d: 'Goal-oriented focus.', tags: ['Routine'] },
          { t: 'IoT', d: 'Personal home automation.', tags: ['Hardware'] }
        ]
      }
    };

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // Sky Blue
    scene.fog = new THREE.FogExp2(0x87ceeb, 0.015);

    const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.04, 100);
    camera.position.set(0, 1.72, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const pt = new THREE.PointLight(0xfff5e0, 1.2, 15);
    pt.position.set(0, 3, 0);
    scene.add(pt);

    // Sunlight
    const sun = new THREE.DirectionalLight(0xfff0dd, 1.5);
    sun.position.set(10, 8, 10);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    scene.add(sun);

    // ROOF
    const roofGeo = new THREE.PlaneGeometry(50, 50);
    const roofMat = new THREE.MeshStandardMaterial({ color: 0xF4EDDE, side: THREE.DoubleSide });
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.rotation.x = Math.PI / 2;
    roof.position.y = 3.5; 
    scene.add(roof);

    // WALLS (Removed manual walls as they conflicted with model orientation)

    // GARDEN ENVIRONMENT (Enhanced)
    const gardenGeo = new THREE.PlaneGeometry(200, 200);
    const gardenMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 }); // Lush Green
    const garden = new THREE.Mesh(gardenGeo, gardenMat);
    garden.rotation.x = -Math.PI / 2;
    garden.position.y = -0.05;
    garden.receiveShadow = true;
    scene.add(garden);

    // Volumetric Sunlight (God Rays)
    function createGodRay(x, y, z, angleX, angleZ) {
      const rayGeo = new THREE.CylinderGeometry(0.5, 2.0, 15, 32, 1, true);
      const rayMat = new THREE.MeshBasicMaterial({
        color: 0xfff0dd,
        transparent: true,
        opacity: 0.1,
        side: THREE.DoubleSide,
        depthWrite: false
      });
      const ray = new THREE.Mesh(rayGeo, rayMat);
      ray.position.set(x, y, z);
      ray.rotation.x = angleX;
      ray.rotation.z = angleZ;
      scene.add(ray);
    }
    // Positioning rays to stream through the window area (assuming window is around X=2-3)
    createGodRay(4, 4, -1, Math.PI / 4, -Math.PI / 8); 

    // Stylized Garden Objects
    function createTree(x, z) {
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 2), new THREE.MeshStandardMaterial({ color: 0x3d2b1f }));
      trunk.position.set(x, 1, z);
      trunk.castShadow = true;
      scene.add(trunk);
      
      const canopy = new THREE.Mesh(new THREE.ConeGeometry(1.5, 3, 8), new THREE.MeshStandardMaterial({ color: 0x1e4520 }));
      canopy.position.set(x, 3, z);
      canopy.castShadow = true;
      scene.add(canopy);
    }
    for (let i = 0; i < 60; i++) {
        const ang = Math.random() * Math.PI * 2;
        const rad = 8 + Math.random() * 40;
        createTree(Math.cos(ang) * rad, Math.sin(ang) * rad);
    }

    const loader = new THREE.GLTFLoader();
    const clickables = [];
    const obs = [];

    loader.load('assets/models/portfolio.glb', function (gltf) {
      const room = gltf.scene;
      const box = new THREE.Box3().setFromObject(room);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      const wrapper = new THREE.Group();
      scene.add(wrapper);

      let scale = 1.0;
      if (size.x > 100) scale = 0.01;
      else if (size.x < 1) scale = 100;
      wrapper.scale.setScalar(scale);

      wrapper.rotation.y = -Math.PI / 4; // Adjusting for model orientation to make it "straight"

      room.position.set(-center.x, -center.y, -center.z);
      room.position.y += size.y / 2;
      wrapper.add(room);

      room.traverse(c => {
        if (c.isMesh) {
          c.castShadow = c.receiveShadow = true;
          if (c.material) c.material.side = THREE.DoubleSide;
        }
      });

      // Hitboxes
      function hit(w, h, d, x, y, z, id, label) {
        const g = new THREE.BoxGeometry(w, h, d);
        const m = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 });
        const hb = new THREE.Mesh(g, m);
        hb.position.set(x, y, z);
        hb.userData = { id, label };
        scene.add(hb);
        clickables.push(hb);
        obs.push({ cx: x, cz: z, r: Math.max(w, d) * 0.5 + 0.15 });
      }

      // Restore Monitor Glow
      const monGlow = new THREE.PointLight(0x1a33cc, 0.8, 3.0);
      monGlow.position.set(-1.5, 1.3, -1.6);
      scene.add(monGlow);

      // Adjusted for scaled room centering - Slightly tighter hitboxes for fluidity
      hit(1.4, 1.5, 1.4, -1.6, 0.8, -1.8, 'desk', 'Desk');
      hit(1.8, 0.8, 0.8, 1.5, 0.4, 1.5, 'bench', 'Sport');
      hit(1.6, 1, 2.2, 1.2, 0.5, -1.2, 'bed', 'Bed');
      hit(1.1, 1.2, 0.9, -1.8, 0.6, 1.5, 'dresser', 'IKEA Alex');
      hit(0.6, 0.6, 0.6, 1.8, 0.5, 0.5, 'nightstand', 'Night Stand');

      document.getElementById('loading').classList.add('done');
    }, undefined, e => {
      console.error(e);
      document.getElementById('loading').innerHTML = '❌ Erreur de chargement';
    });

    let locked = false;
    document.getElementById('enterbtn').onclick = () => {
      document.body.requestPointerLock();
      document.getElementById('overlay').classList.add('hidden'); // Robust hide
    };
    document.addEventListener('pointerlockchange', () => {
      locked = document.pointerLockElement === document.body;
      if (locked) {
        document.getElementById('overlay').classList.add('hidden');
      } else {
        document.getElementById('overlay').classList.remove('hidden');
      }
    });

    const euler = new THREE.Euler(0, 0, 0, 'YXZ');
    const keys = {};
    document.onkeydown = e => keys[e.code] = true;
    document.onkeyup = e => keys[e.code] = false;
    document.onmousemove = e => {
      if (!locked) return;
      euler.y -= e.movementX * 0.002;
      euler.x -= e.movementY * 0.002;
      euler.x = Math.max(-1.5, Math.min(1.5, euler.x));
    };

    const vel = new THREE.Vector3();
    let lastT = performance.now();
    function animate() {
      requestAnimationFrame(animate);
      const now = performance.now(), dt = Math.min((now - lastT) / 1000, 0.1); lastT = now;

      if (locked) {
        const move = new THREE.Vector3();
        if (keys['KeyW']) move.z -= 1;
        if (keys['KeyS']) move.z += 1;
        if (keys['KeyA']) move.x -= 1;
        if (keys['KeyD']) move.x += 1;
        if (move.length() > 0) move.normalize();

        const targetSpeed = 4.2; // Increased speed (was 2.5)
        vel.x += (move.x * targetSpeed - vel.x) * 12 * dt;
        vel.z += (move.z * targetSpeed - vel.z) * 12 * dt;
        const mv = new THREE.Vector3(vel.x, 0, vel.z).applyQuaternion(camera.quaternion);
        let nx = camera.position.x + mv.x * dt, nz = camera.position.z + mv.z * dt;

        // Hard Room Bounds (Tightened)
        const b = 2.15;
        nx = Math.max(-b, Math.min(b, nx)); nz = Math.max(-b, Math.min(b, nz));
        obs.forEach(o => {
          const dx = nx - o.cx, dz = nz - o.cz, d = Math.sqrt(dx * dx + dz * dz);
          if (d < o.r) { const p = (o.r - d) / d; nx += dx * p; nz += dz * p; }
        });
        camera.position.x = nx; camera.position.z = nz;

        // Apply mouse rotation and stabilize height
        camera.position.y = 1.72;
        camera.quaternion.setFromEuler(euler);
        
        const fL = document.getElementById('fl'), fR = document.getElementById('fr');
        if (fL) fL.classList.remove('on');
        if (fR) fR.classList.remove('on');
      }

      // Interacting
      const rc = new THREE.Raycaster();
      rc.setFromCamera(new THREE.Vector2(0, 0), camera);
      const hits = rc.intersectObjects(clickables);
      const labels = document.getElementById('ilabel'), cross = document.getElementById('crosshair');
      if (locked && hits.length > 0 && hits[0].distance < 3.5) {
        labels.classList.add('vis'); cross.classList.add('hi');
        labels.textContent = `[ E ] ${hits[0].object.userData.label}`;
        if (keys['KeyE']) openPanel(hits[0].object.userData.id);
      } else {
        labels.classList.remove('vis'); cross.classList.remove('hi');
      }

      renderer.render(scene, camera);
    }
    animate();

    function openPanel(id) {
      const d = DATA[id]; if (!d) return;
      document.getElementById('pico').textContent = d.icon;
      document.getElementById('ptag').textContent = d.tag;
      document.getElementById('ptit').textContent = d.title;
      document.getElementById('pdsc').textContent = d.desc;
      const el = document.getElementById('pitms'); el.innerHTML = '';
      d.items.forEach(i => {
        const v = document.createElement('div'); v.className = 'pitm';
        v.innerHTML = `<div class="pit">${i.t}</div><div class="pid">${i.d}</div><div class="ptgs">${i.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`;
        el.appendChild(v);
      });
      document.getElementById('panel').classList.add('open');
      document.exitPointerLock();
    }
    document.getElementById('pcls').onclick = () => document.getElementById('panel').classList.remove('open');
    window.onresize = () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); };
  </script>
</body>

</html>
